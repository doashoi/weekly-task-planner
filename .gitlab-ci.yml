# GitLab CI/CD 配置文件
# 适用于阿里云代码托管平台

image: node:18

stages:
  - build
  - deploy

cache:
  paths:
    - node_modules/

before_script:
  - npm install

build_job:
  stage: build
  script:
    - echo "正在构建项目..."
    - npm run build || echo "无构建步骤"
    - echo "构建完成"
  artifacts:
    paths:
      - '*'
      - '!.git/'
    expire_in: 1 hour
  only:
    - main

deploy_job:
  stage: deploy
  before_script:
    # 安装SSH客户端
    - 'which ssh-agent || ( apt-get update -y && apt-get install openssh-client -y )'
    # 开启SSH代理
    - eval $(ssh-agent -s)
    # 添加SSH私钥
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    # 创建SSH目录
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # 添加主机密钥到known_hosts
    - ssh-keyscan $HOST >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts
  script:
    # 通过SSH连接到服务器并执行部署命令
    - ssh $USERNAME@$HOST -p $PORT << 'EOF'
      cd /var/www/task-app

      # 拉取最新代码
      git pull origin main

      # 安装依赖
      npm install

      # 重启服务
      pm2 restart task-app || echo "应用可能尚未启动，尝试启动..."
      pm2 start server.js --name task-app --watch

      # 查看状态
      pm2 status

      echo "部署完成"
EOF
  only:
    - main
  when: on_success
  environment:
    name: production
    url: http://$HOST:$PORT